<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CloudVPN+</title>
  <style>
    /* --- CSS Variables for easy theming --- */
    :root {
      --primary-color: #4F46E5; /* Indigo */
      --primary-hover: #4338ca;
      --bg-color: #F3F4F6;
      --card-bg: #ffffff;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --border-color: #D1D5DB;
      --error-color: #DC2626;
    }

    /* --- Reset & Base Styles --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
    }

    /* --- Card Container --- */
    .login-container {
      background-color: var(--card-bg);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    /* --- Header Section --- */
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
      display: block;
      text-decoration: none;
    }

    .login-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* --- Form Elements --- */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    /* --- Button Styles --- */
    .btn-primary {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-primary:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
    }

    /* --- Footer / Links --- */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* --- Error Message Box --- */
    .error-message {
      background-color: #FEF2F2;
      color: var(--error-color);
      border: 1px solid #FECACA;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      display: none; /* Hidden by default */
      text-align: center;
    }

    /* --- Spinner Animation --- */
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #fff;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="brand-logo">☁️ CloudVPN+</div>
      <h2>Welcome back</h2>
      <p>Please enter your details to sign in.</p>
    </div>

    <div id="errorBox" class="error-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@company.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required />
      </div>

      <button type="submit" id="submitBtn" class="btn-primary">
        <span class="spinner" id="btnSpinner"></span>
        <span id="btnText">Sign In</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a href="register.html">Create account</a></p>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("errorBox");
      const submitBtn = document.getElementById("submitBtn");
      const btnSpinner = document.getElementById("btnSpinner");
      const btnText = document.getElementById("btnText");

      // Reset UI state
      errorBox.style.display = "none";
      errorBox.textContent = "";
      
      // Set Loading State
      submitBtn.disabled = true;
      btnSpinner.style.display = "block";
      btnText.textContent = "Authenticating...";

      try {
        const response = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        // Check if response is JSON, otherwise handle unexpected errors
        const contentType = response.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
           throw new Error("Server error. Please try again later.");
        }

        const data = await response.json();

        if (response.ok && data.redirect) {
          window.location.href = data.redirect;
        } else {
          // Show error inside the card instead of alert
          errorBox.style.display = "block";
          errorBox.textContent = data.message || "Invalid credentials";
        }

      } catch (error) {
        console.error("Login Error:", error);
        errorBox.style.display = "block";
        errorBox.textContent = "Network error. Is the server running?";
      } finally {
        // Reset Loading State
        submitBtn.disabled = false;
        btnSpinner.style.display = "none";
        btnText.textContent = "Sign In";
      }
    });
  </script>

</body>
</html>
