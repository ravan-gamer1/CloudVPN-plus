<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | CloudVPN+</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --text-main: #111827;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --error-bg: #FEF2F2;
      --error-text: #991B1B;
      --ring: rgba(79, 70, 229, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%), 
                        radial-gradient(circle at bottom left, #e0e7ff 0%, transparent 40%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
    }

    .login-card {
      background: var(--card);
      padding: 2.5rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 420px;
      transition: transform 0.2s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    h2 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.025em; }
    p.subtitle { color: var(--text-muted); margin-top: 0.5rem; font-size: 0.95rem; }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring);
    }

    button#submitBtn {
      width: 100%;
      padding: 0.8rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    button#submitBtn:hover { background: var(--primary-hover); }
    button#submitBtn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Spinner style */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      display: none;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .divider:not(:empty)::before { margin-right: .75em; }
    .divider:not(:empty)::after { margin-left: .75em; }

    .google-btn-container {
        display: flex;
        justify-content: center;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      display: none;
      border: 1px solid transparent;
    }
    .alert-error {
      background-color: var(--error-bg);
      color: var(--error-text);
      border-color: #FCA5A5;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover { text-decoration: underline; }

  </style>
</head>
<body>

  <div id="g_id_onload"
       data-client_id="88850224781-haajrv8ku8d2fh7ufc2ian5clu1976md.apps.googleusercontent.com"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>

  <div class="login-card">
    <div class="header">
      <div class="logo">CloudVPN+</div>
      <h2>Welcome back</h2>
      <p class="subtitle">Enter your details to access your account</p>
    </div>

    <div id="alertBox" class="alert alert-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="name@company.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label for="password">Password</label>
            <a href="#" style="font-size: 0.8rem; color: var(--primary); text-decoration: none; margin-bottom: 0.5rem;">Forgot?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="btnSpinner"></span>
        <span id="btnText">Sign in</span>
      </button>
    </form>

    <div class="divider">Or continue with</div>

    <div class="google-btn-container">
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
    </div>

    <div class="footer">
      <p>Don't have an account? <a href="register.html">Create an account</a></p>
    </div>
  </div>

  <script>
    const alertBox = document.getElementById("alertBox");
    const submitBtn = document.getElementById("submitBtn");
    const btnSpinner = document.getElementById("btnSpinner");
    const btnText = document.getElementById("btnText");

    function setLoading(isLoading) {
        if (isLoading) {
            submitBtn.disabled = true;
            btnSpinner.style.display = "block";
            btnText.textContent = "Signing in...";
        } else {
            submitBtn.disabled = false;
            btnSpinner.style.display = "none";
            btnText.textContent = "Sign in";
        }
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      setLoading(true);
      alertBox.style.display = "none";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.redirect) {
          window.location.href = data.redirect;
        } else {
          throw new Error(data.message || "Invalid email or password.");
        }
      } catch (error) {
        alertBox.textContent = error.message;
        alertBox.style.display = "block";
        setLoading(false);
      }
    });

    async function handleCredentialResponse(response) {
      try {
        setLoading(true);
        const res = await fetch("http://localhost:5000/google-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken: response.credential })
        });

        const data = await res.json();
        if (data.redirect) {
          window.location.href = data.redirect;
        } else {
          throw new Error("Google authentication failed.");
        }
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.style.display = "block";
        setLoading(false);
      }
    }
  </script>
</body>
</html>
