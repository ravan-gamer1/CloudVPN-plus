<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CloudVPN+ Authentication</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 320px;
    }

    .loader {
      margin: 20px auto;
      border: 4px solid #1e293b;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>CloudVPN+</h2>
    <div class="loader"></div>
    <p id="status">Authenticating...</p>
  </div>
  
  <script src="auth.js"></script>
</body>
</html>
